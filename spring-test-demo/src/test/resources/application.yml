server:
  port: 80021

appname: dlz.db.springjdbc
spring:
  main:
    web-application-type: none
  datasource:
    driver-class-name: org.sqlite.JDBC
    url: jdbc:sqlite:../dlz-db-spring-boot-starter/test/testdb.sqlite3
    username:
    password:
  profiles:
    active: test
  application:
    name: ${appname}-test
  redis:
    database: 0
    host: 192.168.1.126
    port: 6379
    password: 1234qwer
    timeout: 5000

dlz:
  redis:
    prefix: dlzDbTest
  cache:
    anno: true
  db:
    use-db-sql: false
    log:
      show-result: false
      show-run-sql: true
      show-key-sql: true
      jdbc-sql: true
      show-caller: true
    helper:
      auto-update: true
      package-name: com.dlz.test.db.entity
    logic-delete-field: IS_DELETED
    table-cache-time: -1
  fw:
    api-scan-path:
